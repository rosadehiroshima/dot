"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[username]
format = '[$user]($style)'
style_user = '#586e75'
disabled = false
show_always = true
aliases = { "luizgustavo" = "luca" }

[hostname]
format = '[ :: ](#859900)[$hostname]($style) '
style = '#586e75'
ssh_only = false
aliases = { "MacBook-Air" = "mac" }

[directory]
style = "#2aa198"

[character]
success_symbol = "[λ](#d33682 bold)"
error_symbol = "[λ](#dc322f bold)"
vimcmd_symbol = "[λ](#859900 bold)"

[git_branch]
format = '[$branch]($style)'
style = "#586e75 bold"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](#6c71c4) ($ahead_behind$stashed)]($style)"
style = "#2aa198"
conflicted = ""
untracked = ""
modified = ""
staged = ""
renamed = ""
deleted = ""
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "#586e75"

[cmd_duration]
format = "[$duration]($style) "
style = "#b58900"

[python]
format = "[$virtualenv]($style) "
style = "#859900"
detect_extensions = []
detect_files = []
