"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$python\
$character\
"""

[username]
format = '[$user]($style) '
style_user = '#073642'
disabled = false
show_always = true
aliases = { "luizgustavo" = "luca" }

[directory]
style = "#2aa198"

[character]
success_symbol = "[őĽ](black bold)"
error_symbol = "[őĽ](red bold)"
vimcmd_symbol = "[őĽ](green bold)"

[git_branch]
format = '[$branch]($style)'
style = "#073642 bold"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "#2aa198 "
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "#073642"

[cmd_duration]
format = "[$duration]($style) "
style = "#b58900"

[python]
format = "[$virtualenv]($style) "
style = "#073642"
detect_extensions = []
detect_files = []
